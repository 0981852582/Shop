<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý công việc</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        #calendar { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .fc-event { cursor: pointer; padding: 4px; border: none !important; border-radius: 4px !important; position: relative; }
        .task-item { display: flex; align-items: center; gap: 5px; width: 100%; overflow: hidden; }
        .task-checkbox { cursor: pointer; width: 14px; height: 14px; flex-shrink: 0; }
        .task-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; font-size: 0.9em; font-weight: 500; color: #fff; }
        .task-title.completed { text-decoration: line-through; opacity: 0.8; }
        
        /* Chỉnh sửa dấu x lên trên 2px[cite: 10] */
        .btn-delete { 
            color: #fff; 
            font-weight: bold; 
            font-size: 18px; 
            padding: 0 5px; 
            cursor: pointer; 
            margin-left: auto; 
            display: none; 
            transform: translateY(-2px); /* Dịch chuyển lên trên 2px */
        }
        .fc-event:hover .btn-delete { display: block; }
        .btn-delete:hover { transform: translateY(-2px) scale(1.2); }

        .fc-day-past { background-color: #f0f0f0 !important; opacity: 0.6; }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 10px; width: 400px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #888; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input[type="text"], .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .save-btn { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .save-btn:disabled { background: #95a5a6; cursor: not-allowed; }

        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        .inline-spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; flex-shrink: 0; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3 id="modalTitle">⏰ Thông tin công việc</h3>
        <form id="taskForm">
            <input type="hidden" id="m_id">
            <div class="form-group">
                <label>Tên công việc:</label>
                <input type="text" id="m_title" required>
            </div>
            <div class="form-group">
                <label>Mô tả chi tiết:</label>
                <textarea id="m_description" rows="3" placeholder="Nhập ghi chú..."></textarea>
            </div>
            <div class="form-group">
                <label>Bắt đầu:</label>
                <input type="text" id="m_start" required readonly>
            </div>
            <div class="form-group">
                <label>Kết thúc:</label>
                <input type="text" id="m_end" required readonly>
            </div>
            <div class="form-group" style="display:flex; align-items:center; gap:8px">
                <input type="checkbox" id="m_completed">
                <label for="m_completed" style="margin-bottom:0">Đã hoàn thành</label>
            </div>
            <button type="submit" id="submitBtn" class="save-btn">
                <span class="spinner" id="loader"></span>
                <span id="btnText">Lưu thông tin</span>
            </button>
        </form>
    </div>
</div>

<div id="calendar"></div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const modal = document.getElementById('taskModal');
        const taskForm = document.getElementById('taskForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        
        const pickerCfg = { 
            enableTime: true, time_24hr: true, dateFormat: "Y-m-d H:i:S", locale: "vn", minDate: "today" 
        };
        const startPicker = flatpickr("#m_start", pickerCfg);
        const endPicker = flatpickr("#m_end", pickerCfg);

        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            locale: 'vi',
            events: '/tasks',
            selectable: true,
            editable: true,
            
            eventDataTransform: function(eventData) {
                const now = new Date();
                const end = new Date(eventData.end);
                const isDone = eventData.is_completed === true || eventData.is_completed === 1;

                if (isDone) {
                    eventData.backgroundColor = '#3498db'; 
                } else if (now > end) {
                    eventData.backgroundColor = '#e74c3c'; 
                } else {
                    eventData.backgroundColor = '#2ecc71'; 
                }
                return eventData;
            },

            eventContent: function(arg) {
                const isDone = arg.event.extendedProps.is_completed;
                const description = arg.event.extendedProps.description || "Không có mô tả";
                let container = document.createElement('div');
                container.className = 'task-item';
                container.setAttribute('title', description);
                
                let cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'task-checkbox';
                cb.checked = isDone;

                let inlineLoader = document.createElement('div');
                inlineLoader.className = 'inline-spinner';

                cb.onclick = async (e) => {
                    e.stopPropagation();
                    cb.style.display = 'none';
                    inlineLoader.style.display = 'block';

                    try {
                        const res = await fetch('/toggle-complete', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ id: arg.event.id, is_completed: cb.checked })
                        });
                        if (res.ok) calendar.refetchEvents();
                        else throw new Error();
                    } catch (error) {
                        cb.checked = !cb.checked;
                        cb.style.display = 'block';
                        inlineLoader.style.display = 'none';
                        alert("Cập nhật thất bại!");
                    }
                };

                let title = document.createElement('span');
                title.className = `task-title ${isDone ? 'completed' : ''}`;
                title.innerText = arg.event.title;

                let delBtn = document.createElement('span');
                delBtn.className = 'btn-delete';
                delBtn.innerHTML = '&times;';
                delBtn.onclick = async (e) => {
                    e.stopPropagation();
                    if (confirm("Xóa công việc này?")) {
                        const res = await fetch(`/delete-task/${arg.event.id}`, { method: 'DELETE' });
                        if (res.ok) arg.event.remove();
                    }
                };

                container.append(cb, inlineLoader, title, delBtn);
                return { domNodes: [container] };
            },

            eventClick: function(info) {
                modal.style.display = 'block';
                document.getElementById('m_id').value = info.event.id;
                document.getElementById('m_title').value = info.event.title;
                document.getElementById('m_description').value = info.event.extendedProps.description || "";
                document.getElementById('m_completed').checked = info.event.extendedProps.is_completed;
                
                startPicker.set("minDate", null); 
                startPicker.setDate(info.event.start);
                startPicker.set("minDate", "today");

                endPicker.set("minDate", null);
                endPicker.setDate(info.event.end || info.event.start);
                endPicker.set("minDate", "today");
            },

            select: function(info) {
                const selectedDate = new Date(info.start);
                const today = new Date();
                today.setHours(0,0,0,0);

                if (selectedDate < today) {
                    calendar.unselect();
                    alert("Không thể tạo công việc cho những ngày trong quá khứ!");
                    return;
                }

                taskForm.reset();
                document.getElementById('m_id').value = "";
                modal.style.display = 'block';
                
                let dStart = new Date(info.start); dStart.setHours(0,0,0);
                let dEnd = new Date(info.start); dEnd.setDate(dEnd.getDate() + 1); dEnd.setHours(23, 59, 59);

                startPicker.setDate(dStart);
                endPicker.setDate(dEnd);
            }
        });

        calendar.render();
        document.querySelector('.close-btn').onclick = () => modal.style.display = 'none';

        taskForm.onsubmit = async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            loader.style.display = "block";
            btnText.innerText = "Đang lưu...";

            const id = document.getElementById('m_id').value;
            try {
                const res = await fetch(id ? '/update-task' : '/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id,
                        title: document.getElementById('m_title').value,
                        description: document.getElementById('m_description').value,
                        start_date: document.getElementById('m_start').value,
                        due_date: document.getElementById('m_end').value,
                        is_completed: document.getElementById('m_completed').checked
                    })
                });

                if (res.ok) {
                    modal.style.display = 'none';
                    calendar.refetchEvents();
                }
            } catch (err) {
                alert("Lỗi kết nối server!");
            } finally {
                submitBtn.disabled = false;
                loader.style.display = "none";
                btnText.innerText = "Lưu thông tin";
            }
        };
    });
</script>
</body>
</html>
