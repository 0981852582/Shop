<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Danh sách công việc của tôi</h1>
    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="Việc cần làm..." required>
        <button type="submit">Thêm</button>
    </form>
    <ul id="taskList"></ul>

    <script>1
        fetch('/tasks')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('taskList');
                data.forEach(task => {
                    const li = document.createElement('li');
                    li.innerHTML = `${task.title} <a href="/delete/${task.id}">[Xóa]</a>`;
                    list.appendChild(li);
                });
            });
    </script>
</body>
</html>
